<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coffee Lab — Roastery (Phase 1)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #e9e6e0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  #ui { position: fixed; top: 22px; left: 26px; z-index: 10; pointer-events: none; }
  #ui .kicker { font-size: 11px; letter-spacing: .34em; text-transform: uppercase; color: #9c7a3e; font-weight: 600; }
  #ui h1 { font-family: Georgia, "Times New Roman", serif; font-weight: 500; font-size: 34px; color: #20201e; margin-top: 6px; line-height: 1.05; }
  #ui .sub { margin-top: 6px; font-size: 13px; color: #6a6a64; letter-spacing: .01em; }

  #views { position: fixed; top: 24px; right: 26px; z-index: 10; display: flex; gap: 6px;
    background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); padding: 5px; border-radius: 30px;
    border: 1px solid rgba(0,0,0,0.06); }
  #views button { border: none; border-radius: 24px; padding: 9px 15px; font-size: 11px; font-weight: 600;
    letter-spacing: .03em; color: rgba(30,28,24,0.62); background: transparent; cursor: pointer; }
  #views button.on { background: #c2a063; color: #1a1308; box-shadow: 0 2px 10px rgba(194,160,99,0.4); }

  .lab { position: fixed; z-index: 9; transform: translate(-50%, -50%); pointer-events: none;
    font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
    color: #2a2622; background: rgba(255,255,255,0.82); border: 1px solid rgba(0,0,0,0.07);
    padding: 4px 9px; border-radius: 20px; white-space: nowrap; box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    transition: opacity .15s; }

  #foot { position: fixed; bottom: 16px; left: 26px; z-index: 10; font-size: 12px; color: #80807a; pointer-events: none; }
  #load { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 20;
    background: #e9e6e0; color: #8a857c; font-size: 14px; letter-spacing: .04em; transition: opacity .6s; }
  #err { position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 99; display: none;
    font: 12px/1.5 ui-monospace, monospace; background: #2a1215; color: #ff8a80; padding: 10px 14px;
    border-radius: 8px; border: 1px solid #5c2b2e; white-space: pre-wrap; max-height: 38vh; overflow: auto; }
</style>
</head>
<body>
  <div id="app"></div>
  <div id="ui">
    <div class="kicker">Coffee Lab</div>
    <h1>Roastery — Phase 1</h1>
    <div class="sub">Single-room layout · drag to orbit · right-drag to pan · scroll to zoom</div>
  </div>
  <div id="views">
    <button data-v="entrance" class="on">Entrance</button>
    <button data-v="far">Far end</button>
    <button data-v="dolly">Dollhouse</button>
  </div>
  <div id="foot">One room ≈ 8 × 3.3 m · roast · QC · blend · package · green storage</div>
  <div id="load">Building roastery…</div>
  <div id="err"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
    const errBox = document.getElementById('err');
    function showErr(msg) { errBox.style.display = 'block'; errBox.textContent += (errBox.textContent ? '\n' : '') + msg; }
    window.addEventListener('error', function (e) { showErr('[error] ' + (e.message || e.type) + (e.filename ? ' (' + e.lineno + ')' : '')); });

    if (typeof THREE === 'undefined') { showErr('Three.js failed to load from CDN — check your internet connection.'); return; }

    const app = document.getElementById('app');
    let W = window.innerWidth, H = window.innerHeight;

    // ---------- renderer / scene / camera ----------
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W, H);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.02;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe9e6e0);

    // procedural environment map so stainless/chrome reflects a bright room (not black)
    (function () {
      const pmrem = new THREE.PMREMGenerator(renderer);
      const ec = document.createElement('canvas'); ec.width = 16; ec.height = 64;
      const ex = ec.getContext('2d');
      const g = ex.createLinearGradient(0, 0, 0, 64);
      g.addColorStop(0.0, '#ffffff'); g.addColorStop(0.5, '#dad8d2'); g.addColorStop(1.0, '#a6a49e');
      ex.fillStyle = g; ex.fillRect(0, 0, 16, 64);
      const tex = new THREE.CanvasTexture(ec);
      tex.mapping = THREE.EquirectangularReflectionMapping;
      scene.environment = pmrem.fromEquirectangular(tex).texture;
      tex.dispose(); pmrem.dispose();
    })();

    const camera = new THREE.PerspectiveCamera(40, W / H, 0.05, 100);

    // ---------- room dims ----------
    const LEN = 8.0, WID = 3.3, HGT = 3.0;       // z length, x width, y height
    const RX = WID / 2;                           // right wall +X, left wall -X

    // ---------- orbit ----------
    const VIEWS = {
      entrance: { theta: Math.PI, phi: 1.46, radius: 4.8, tx: 0, ty: 1.15, tz: 5.0 },
      far:      { theta: 0,       phi: 1.46, radius: 4.8, tx: 0, ty: 1.15, tz: 3.0 },
      dolly:    { theta: 0.72,    phi: 0.74, radius: 9.6, tx: 0, ty: 0.55, tz: 4.2 },
    };
    const cam = Object.assign({}, VIEWS.entrance);
    const goal = Object.assign({}, VIEWS.entrance);
    const tgt = new THREE.Vector3();

    function applyCam() {
      const sp = Math.sin(cam.phi), cp = Math.cos(cam.phi);
      camera.position.set(
        cam.tx + cam.radius * sp * Math.sin(cam.theta),
        cam.ty + cam.radius * cp,
        cam.tz + cam.radius * sp * Math.cos(cam.theta)
      );
      tgt.set(cam.tx, cam.ty, cam.tz);
      camera.lookAt(tgt);
    }
    function setView(name) {
      Object.assign(goal, VIEWS[name]);
      document.querySelectorAll('#views button').forEach(function (b) { b.classList.toggle('on', b.dataset.v === name); });
    }
    document.querySelectorAll('#views button').forEach(function (b) {
      b.addEventListener('click', function () { setView(b.dataset.v); });
    });

    // pointer drag + wheel
    let dragging = false, panning = false, px = 0, py = 0;
    const _vR = new THREE.Vector3(), _vU = new THREE.Vector3();
    renderer.domElement.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    renderer.domElement.addEventListener('pointerdown', function (e) {
      dragging = true; panning = (e.button === 2 || e.button === 1 || e.shiftKey); px = e.clientX; py = e.clientY;
    });
    window.addEventListener('pointerup', function () { dragging = false; panning = false; });
    window.addEventListener('pointermove', function (e) {
      if (!dragging) return;
      const dx = e.clientX - px, dy = e.clientY - py;
      if (panning) {
        const s = goal.radius * 0.0016;
        _vR.set(1, 0, 0).applyQuaternion(camera.quaternion);
        _vU.set(0, 1, 0).applyQuaternion(camera.quaternion);
        goal.tx = Math.max(-4, Math.min(4, goal.tx + (-_vR.x * dx + _vU.x * dy) * s));
        goal.ty = Math.max(0.2, Math.min(2.8, goal.ty + (-_vR.y * dx + _vU.y * dy) * s));
        goal.tz = Math.max(-2, Math.min(10, goal.tz + (-_vR.z * dx + _vU.z * dy) * s));
      } else {
        goal.theta -= dx * 0.006;
        goal.phi = Math.max(0.16, Math.min(1.5, goal.phi - dy * 0.006));
      }
      px = e.clientX; py = e.clientY;
    });
    renderer.domElement.addEventListener('wheel', function (e) {
      e.preventDefault();
      goal.radius = Math.max(2.4, Math.min(15, goal.radius * (1 + e.deltaY * 0.0012)));
    }, { passive: false });

    // ---------- material helpers ----------
    function M(color, opts) { return new THREE.MeshStandardMaterial(Object.assign({ color: color, roughness: 0.7, metalness: 0.0 }, opts || {})); }
    const matWall   = M(0xf2f1ee, { roughness: 0.97 });
    const matFloor  = M(0x9c9d9e, { roughness: 0.34, metalness: 0.12 });
    const matCeil   = M(0xeeede9, { roughness: 1.0 });
    const steel = function () { return M(0xc6ccd2, { metalness: 0.86, roughness: 0.34 }); };
    const steelDark = function () { return M(0x9aa0a6, { metalness: 0.8, roughness: 0.4 }); };
    const black = function () { return M(0x1d1d1f, { metalness: 0.45, roughness: 0.5 }); };
    const chrome = function () { return M(0xe2e5e8, { metalness: 0.95, roughness: 0.22 }); };
    const wood = function () { return M(0x6e4d2e, { roughness: 0.58 }); };
    const brass = function () { return M(0xc2a063, { metalness: 1.0, roughness: 0.32 }); };
    function glow(color, i) { return M(0x111111, { emissive: color, emissiveIntensity: i == null ? 1 : i, roughness: 1 }); }

    function box(w, h, d, mat, x, y, z, parent) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
      (parent || scene).add(m); return m;
    }
    function cyl(rt, rb, h, mat, x, y, z, parent, seg) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg || 28), mat);
      m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
      (parent || scene).add(m); return m;
    }

    // a single-sided plane whose normal points where we want (so walls cull from outside)
    function plane(w, h, mat, x, y, z, rx, ry) {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
      m.position.set(x, y, z); m.rotation.x = rx || 0; m.rotation.y = ry || 0;
      m.receiveShadow = true; scene.add(m); return m;
    }

    // ---------- room shell ----------
    function buildRoom() {
      // floor (normal +Y)
      plane(WID, LEN, matFloor, 0, 0, LEN / 2, -Math.PI / 2, 0);
      // ceiling (normal -Y, faces into room)
      plane(WID, LEN, matCeil, 0, HGT, LEN / 2, Math.PI / 2, 0);
      // far wall z=LEN (normal -Z)
      plane(WID, HGT, matWall, 0, HGT / 2, LEN, 0, Math.PI);
      // entrance wall z=0 (normal +Z) — kept; door opening rendered over it
      plane(WID, HGT, matWall, 0, HGT / 2, 0, 0, 0);
      // right wall +X (normal -X)
      plane(LEN, HGT, matWall, RX, HGT / 2, LEN / 2, 0, -Math.PI / 2);
      // left wall -X (normal +X)
      plane(LEN, HGT, matWall, -RX, HGT / 2, LEN / 2, 0, Math.PI / 2);

      // skirting accent line on floor edges (subtle)
      // windows on the right (exterior) wall — bright daylight panels, slightly inset
      const winMat = glow(0xdcebf2, 0.9);
      for (let i = 0; i < 2; i++) {
        const m = new THREE.Mesh(new THREE.PlaneGeometry(1.3, 1.1), winMat);
        m.position.set(RX - 0.02, 1.95, 2.0 + i * 2.1); m.rotation.y = -Math.PI / 2; scene.add(m);
        // frame
        const f = box(0.06, 1.24, 1.46, M(0xeae8e3, { roughness: 0.9 }), RX - 0.03, 1.95, 2.0 + i * 2.1);
      }

      // ceiling LED light panels + matching point lights
      const ledMat = glow(0xfff6e8, 1.4);
      for (let i = 0; i < 4; i++) {
        const z = 1.3 + i * 1.9;
        const p = new THREE.Mesh(new THREE.PlaneGeometry(0.22, 1.3), ledMat);
        p.position.set(0, HGT - 0.02, z); p.rotation.x = Math.PI / 2; scene.add(p);
      }

      // two wall-mounted split AC units, high on the walls
      function ac(x, z, ry) {
        const g = new THREE.Group();
        box(1.0, 0.3, 0.22, M(0xf6f5f2, { roughness: 0.7 }), 0, 0, 0, g);
        box(0.86, 0.05, 0.02, M(0x3a3a3a, { roughness: 0.6 }), 0, -0.08, 0.11, g); // vent slit
        g.position.set(x, 2.55, z); g.rotation.y = ry; scene.add(g);
      }
      ac(RX - 0.12, 4.0, -Math.PI / 2);
      ac(-RX + 0.12, 4.0, Math.PI / 2);

      // (doors are placed on the side walls in the assembly section, via makeDoor)
      // framed farmer photo (warm wood) on entrance wall
      const ph = box(0.5, 0.66, 0.04, wood(), -1.15, 1.5, 0.04);
      box(0.4, 0.54, 0.02, M(0xb9a47f, { roughness: 0.8 }), -1.15, 1.5, 0.07);
    }

    // ---------- lights ----------
    function buildLights() {
      scene.add(new THREE.HemisphereLight(0xffffff, 0xb8b6b0, 0.62));
      scene.add(new THREE.AmbientLight(0xffffff, 0.14));

      // daylight raking in from the window (exterior +X) wall
      const day = new THREE.DirectionalLight(0xfff3e2, 0.95);
      day.position.set(7, 6.5, 4.5);
      day.target.position.set(-0.5, 0.8, 4.5);
      day.castShadow = true;
      day.shadow.mapSize.set(2048, 2048);
      const c = day.shadow.camera; c.left = -3; c.right = 3; c.top = 6; c.bottom = -6; c.near = 0.5; c.far = 22;
      day.shadow.bias = -0.0004;
      scene.add(day); scene.add(day.target);

      // even neutral task fill from ceiling line
      for (let i = 0; i < 4; i++) {
        const pl = new THREE.PointLight(0xfff4ea, 0.32, 7, 2);
        pl.position.set(0, 2.8, 1.3 + i * 1.9); scene.add(pl);
      }
      // warm accent at the entrance/QC end
      const warm = new THREE.PointLight(0xffcf99, 0.5, 6, 2);
      warm.position.set(0, 2.0, 1.0); scene.add(warm);
    }

    // ---------- equipment builders ----------

    // 6 kg black drum roaster + exhaust duct
    function roaster6(x, z) {
      const g = new THREE.Group();
      // legs
      [[-0.32, -0.26], [0.32, -0.26], [-0.32, 0.26], [0.32, 0.26]].forEach(function (p) {
        cyl(0.03, 0.03, 0.24, steelDark(), p[0], 0.12, p[1], g);
      });
      // main body
      box(0.74, 0.92, 0.62, black(), 0, 0.7, 0, g);
      // top hopper (cone + rim)
      cyl(0.26, 0.1, 0.34, black(), 0, 1.33, -0.02, g);
      cyl(0.27, 0.27, 0.05, steel(), 0, 1.52, -0.02, g);
      // front drum door (faces -X, into room) — chrome ring + dark face
      const dr = cyl(0.19, 0.19, 0.06, chrome(), -0.40, 0.66, -0.04, g); dr.rotation.z = Math.PI / 2;
      const drc = cyl(0.13, 0.13, 0.07, M(0x111111, { metalness: 0.5, roughness: 0.4 }), -0.42, 0.66, -0.04, g); drc.rotation.z = Math.PI / 2;
      box(0.04, 0.16, 0.04, chrome(), -0.5, 0.66, -0.04, g); // door handle
      // side cooling tray (toward entrance, -z) with stirring arm
      const tray = cyl(0.3, 0.3, 0.1, steel(), -0.06, 0.46, -0.48, g);
      cyl(0.3, 0.3, 0.02, M(0x2a2a2a, { metalness: 0.4 }), -0.06, 0.51, -0.48, g); // perforated look top
      box(0.5, 0.03, 0.05, steelDark(), -0.06, 0.54, -0.48, g); // stir arm
      cyl(0.03, 0.03, 0.12, steelDark(), -0.06, 0.58, -0.48, g); // arm hub
      // control panel + screen
      box(0.22, 0.3, 0.05, M(0x232323), -0.30, 0.95, 0.3, g);
      box(0.16, 0.12, 0.02, glow(0x66ccaa, 1.1), -0.30, 1.02, 0.33, g);
      // exhaust duct rising from the back to ceiling
      const duct = cyl(0.09, 0.09, HGT - 1.2, M(0xc9cdd2, { metalness: 0.7, roughness: 0.5 }), 0.18, 1.2 + (HGT - 1.2) / 2, 0.26, g);
      cyl(0.11, 0.11, 0.08, steelDark(), 0.18, 1.25, 0.26, g); // collar
      g.position.set(x, 0, z); g.rotation.y = Math.PI; // face drum/door toward room (-X after flip handled by x sign)
      scene.add(g); return g;
    }

    // 1 kg sample roaster (small)
    function roaster1(x, z) {
      const g = new THREE.Group();
      box(0.42, 0.16, 0.36, steel(), 0, 0.62, 0, g);             // bench/base
      [[-0.16, -0.14], [0.16, -0.14], [-0.16, 0.14], [0.16, 0.14]].forEach(function (p) { cyl(0.02, 0.02, 0.54, steelDark(), p[0], 0.27, p[1], g); });
      box(0.34, 0.4, 0.3, black(), 0, 0.9, 0, g);                 // body
      const dr = cyl(0.1, 0.1, 0.05, chrome(), -0.18, 0.88, 0, g); dr.rotation.z = Math.PI / 2; // drum face
      cyl(0.12, 0.05, 0.16, black(), 0, 1.18, 0, g);              // mini hopper
      cyl(0.04, 0.04, 0.9, M(0xc9cdd2, { metalness: 0.7, roughness: 0.5 }), 0.1, 1.55, 0.1, g); // little chimney
      box(0.1, 0.08, 0.02, glow(0xffaa55, 1.0), 0.0, 0.92, 0.16, g); // small display
      g.position.set(x, 0, z);
      scene.add(g); return g;
    }

    // stainless gravity destoner (slim tower)
    function destoner(x, z) {
      const g = new THREE.Group();
      box(0.32, 1.2, 0.32, steel(), 0, 0.7, 0, g);
      cyl(0.14, 0.05, 0.2, steel(), 0, 1.42, 0, g);     // funnel top
      cyl(0.05, 0.05, 0.3, M(0xcfe0e6, { metalness: 0.2, roughness: 0.1, transparent: true, opacity: 0.5 }), 0.0, 1.1, 0.18, g); // sight tube
      [[-0.12, -0.12], [0.12, -0.12], [-0.12, 0.12], [0.12, 0.12]].forEach(function (p) { cyl(0.02, 0.02, 0.2, steelDark(), p[0], 0.1, p[1], g); });
      g.position.set(x, 0, z);
      scene.add(g); return g;
    }

    // steel logging table + laptops
    function loggingTable(x, z) {
      const g = new THREE.Group();
      box(0.52, 0.04, 0.74, steel(), 0, 0.76, 0, g);
      [[-0.22, -0.32], [0.22, -0.32], [-0.22, 0.32], [0.22, 0.32]].forEach(function (p) { cyl(0.02, 0.02, 0.76, steelDark(), p[0], 0.38, p[1], g); });
      function laptop(lx, lz, ry) {
        const l = new THREE.Group();
        box(0.3, 0.02, 0.21, M(0x2c2c2e, { metalness: 0.5, roughness: 0.5 }), 0, 0, 0, l);   // base
        const scr = box(0.3, 0.2, 0.015, M(0x202022, { metalness: 0.4 }), 0, 0.1, -0.1, l);  // screen back
        box(0.27, 0.17, 0.005, glow(0x9fd3ff, 0.7), 0, 0.1, -0.092, l);                       // screen glow
        scr.rotation.x = -0.35; l.children[1].position.z = -0.1; l.children[2].position.z = -0.092;
        l.position.set(lx, 0.79, lz); l.rotation.y = ry; g.add(l);
      }
      laptop(0, 0.0, 0.08);   // one laptop per roaster's own table
      g.position.set(x, 0, z);
      scene.add(g); return g;
    }

    // a door on a side wall (px = wall x; ry orients the panel to face into the room)
    function makeDoor(px, pz, ry, woodAccent) {
      const g = new THREE.Group();
      const fr = woodAccent ? wood() : M(0xe6e4df, { roughness: 0.85 });
      box(0.1, 2.12, 0.1, fr, -0.52, 1.06, 0, g);   // jambs
      box(0.1, 2.12, 0.1, fr, 0.52, 1.06, 0, g);
      box(1.14, 0.12, 0.1, fr, 0, 2.12, 0, g);       // lintel
      box(0.9, 1.98, 0.04, M(0xbfd3d8, { metalness: 0.2, roughness: 0.15, transparent: true, opacity: 0.5 }), 0, 1.0, 0.0, g); // glass
      box(0.04, 0.3, 0.05, steelDark(), 0.34, 1.0, 0.06, g);   // handle
      g.position.set(px, 0, pz); g.rotation.y = ry; scene.add(g); return g;
    }

    // stainless cupping / QC table with degas bins on a lower shelf
    function qcTable(x, z) {
      const g = new THREE.Group();
      box(0.6, 0.05, 1.0, steel(), 0, 0.9, 0, g);          // top
      box(0.58, 0.03, 0.98, steelDark(), 0, 0.42, 0, g);   // lower shelf
      [[-0.26, -0.46], [0.26, -0.46], [-0.26, 0.46], [0.26, 0.46]].forEach(function (p) { cyl(0.022, 0.022, 0.9, steelDark(), p[0], 0.45, p[1], g); });
      // row of lidded degassing bins under
      for (let i = 0; i < 3; i++) {
        box(0.34, 0.22, 0.24, M(0x8b95a0, { roughness: 0.6 }), 0, 0.6, -0.32 + i * 0.32, g);
        box(0.36, 0.04, 0.26, M(0x5f6b78, { roughness: 0.5 }), 0, 0.73, -0.32 + i * 0.32, g);
      }
      // a few cupping bowls + spoons on top
      for (let i = 0; i < 4; i++) { cyl(0.05, 0.04, 0.05, M(0xf4f1ea, { roughness: 0.4 }), -0.12, 0.945, -0.36 + i * 0.24, g); }
      g.position.set(x, 0, z);
      scene.add(g); return g;
    }

    // tall stainless vertical blender (the real unit)
    function blender(x, z) {
      const g = new THREE.Group();
      cyl(0.22, 0.22, 0.6, chrome(), 0, 0.98, 0, g);          // polished cylindrical body
      cyl(0.22, 0.07, 0.32, chrome(), 0, 0.52, 0, g);          // narrowing cone
      cyl(0.1, 0.1, 0.16, M(0x6c6f73, { metalness: 0.6, roughness: 0.5 }), 0, 0.34, 0, g); // grey motor housing
      cyl(0.2, 0.2, 0.05, steel(), 0, 1.3, 0, g);              // top lid
      cyl(0.05, 0.05, 0.08, steelDark(), 0, 1.37, 0, g);       // lid knob
      box(0.1, 0.14, 0.05, M(0x202022), 0.2, 0.9, 0, g);        // black control box
      box(0.06, 0.06, 0.01, glow(0x66ccaa, 0.9), 0.235, 0.92, 0, g);
      // four dark angled legs with casters
      const legPos = [[-0.18, -0.18], [0.18, -0.18], [-0.18, 0.18], [0.18, 0.18]];
      legPos.forEach(function (p) {
        const leg = cyl(0.016, 0.016, 0.4, M(0x3a3c40, { metalness: 0.5, roughness: 0.5 }), p[0] * 0.6, 0.22, p[1] * 0.6, g);
        leg.position.set(p[0] * 0.55, 0.2, p[1] * 0.55); leg.rotation.x = p[1] * 0.5; leg.rotation.z = -p[0] * 0.5;
        cyl(0.035, 0.035, 0.04, M(0x222222, { roughness: 0.6 }), p[0], 0.03, p[1], g);  // caster
      });
      g.position.set(x, 0, z);
      scene.add(g); return g;
    }

    // left wall: packaging machines (weigh-filler + sealer) on a bench
    function packagingMachines(x, z) {
      const g = new THREE.Group();
      box(0.55, 0.05, 1.0, steel(), 0, 0.9, 0, g);             // bench top
      [[-0.24, -0.46], [0.24, -0.46], [-0.24, 0.46], [0.24, 0.46]].forEach(function (p) { cyl(0.022, 0.022, 0.9, steelDark(), p[0], 0.45, p[1], g); });
      // weigh-filler: box + hopper funnel on top + screen
      box(0.34, 0.46, 0.34, steel(), 0.02, 1.18, -0.28, g);
      cyl(0.18, 0.05, 0.22, steelDark(), 0.02, 1.5, -0.28, g); // hopper
      box(0.14, 0.1, 0.02, glow(0x9fd3ff, 0.8), 0.2, 1.2, -0.28, g);
      // impulse/band sealer: box + lever arm
      box(0.3, 0.18, 0.34, M(0x33363a, { metalness: 0.5, roughness: 0.5 }), 0.0, 1.0, 0.34, g);
      const arm = box(0.28, 0.05, 0.06, steelDark(), 0.0, 1.12, 0.45, g); arm.rotation.x = -0.5;
      g.position.set(x, 0, z);
      scene.add(g); return g;
    }

    // left wall: stainless packaging work bench (tidy)
    function packagingBench(x, z) {
      const g = new THREE.Group();
      box(0.55, 0.05, 1.1, steel(), 0, 0.9, 0, g);
      box(0.53, 0.03, 1.08, steelDark(), 0, 0.4, 0, g);
      [[-0.24, -0.5], [0.24, -0.5], [-0.24, 0.5], [0.24, 0.5]].forEach(function (p) { cyl(0.022, 0.022, 0.9, steelDark(), p[0], 0.45, p[1], g); });
      // a small scale + a stack of flat pouches on top
      box(0.16, 0.05, 0.16, steel(), -0.1, 0.945, -0.3, g);
      box(0.14, 0.03, 0.02, glow(0xbfe0c8, 0.7), -0.1, 0.98, -0.3, g);
      box(0.2, 0.06, 0.28, M(0x6b5b46, { roughness: 0.8 }), 0.08, 0.95, 0.25, g); // kraft pouches
      g.position.set(x, 0, z);
      scene.add(g); return g;
    }

    // far end: steel shelving with green-coffee crates + sacks
    function greenShelving(x, z) {
      const g = new THREE.Group();
      const fW = 0.5, fL = 1.5, ph = 2.0;
      // 4 posts
      [[-fW / 2, -fL / 2], [fW / 2, -fL / 2], [-fW / 2, fL / 2], [fW / 2, fL / 2]].forEach(function (p) {
        cyl(0.025, 0.025, ph, steelDark(), p[0], ph / 2, p[1], g);
      });
      // 4 shelves + crates/sacks
      const colors = [0x6f8794, 0x7e7a72, 0x8a9aa2, 0x6a6f74];
      for (let s = 0; s < 4; s++) {
        const y = 0.45 + s * 0.5;
        box(fW + 0.04, 0.03, fL + 0.04, steel(), 0, y, 0, g);
        for (let c = 0; c < 3; c++) {
          if ((s + c) % 4 === 0) {
            // a green sack (rounded)
            const sack = box(0.34, 0.26, 0.34, M(0xcdbf9c, { roughness: 0.85 }), 0, y + 0.17, -0.5 + c * 0.5, g);
          } else {
            box(0.36, 0.26, 0.4, M(colors[(s + c) % colors.length], { roughness: 0.6 }), 0, y + 0.16, -0.5 + c * 0.5, g);
            box(0.3, 0.02, 0.34, M(0x2a2a2a, { roughness: 0.7 }), 0, y + 0.29, -0.5 + c * 0.5, g); // crate lip
          }
        }
      }
      g.position.set(x, 0, z);
      scene.add(g); return g;
    }

    // ---------- assemble the room ----------
    buildLights();
    buildRoom();

    // right (exterior) wall — SWAPPED: 6 kg + destoner at the FRONT, 1 kg at the BACK; each roaster has its own table + laptop
    roaster6(RX - 0.42, 2.7);
    destoner(RX - 0.18, 1.85);
    loggingTable(RX - 0.34, 3.7);          // the 6 kg roaster's table + laptop
    loggingTable(RX - 0.34, 4.8);          // the 1 kg roaster's table + laptop
    roaster1(RX - 0.32, 5.8);

    // left wall — packaging front -> back; green storage moved forward so it doesn't block the back door
    packagingMachines(-RX + 0.34, 2.2);
    packagingBench(-RX + 0.34, 3.7);
    greenShelving(-RX + 0.32, 5.3);

    // near (entrance) end — QC table + blender in the foreground
    qcTable(0.42, 1.5);
    blender(-0.5, 1.25);

    // doors: one behind the 1 kg roaster (right wall), one behind the green storage (left wall)
    makeDoor(RX - 0.02, 6.9, -Math.PI / 2, true);    // behind the 1 kg roaster — warm-wood main door
    makeDoor(-RX + 0.02, 6.8, Math.PI / 2, false);   // behind the green storage

    // ---------- floating zone labels ----------
    const LABELS = [
      { t: '6 kg roaster', p: new THREE.Vector3(RX - 0.42, 1.7, 2.7) },
      { t: '1 kg sample', p: new THREE.Vector3(RX - 0.32, 1.35, 5.8) },
      { t: 'QC / cupping', p: new THREE.Vector3(0.42, 1.15, 1.5) },
      { t: 'Blender', p: new THREE.Vector3(-0.5, 1.5, 1.25) },
      { t: 'Packaging', p: new THREE.Vector3(-RX + 0.34, 1.35, 2.2) },
      { t: 'Green storage', p: new THREE.Vector3(-RX + 0.32, 2.0, 5.3) },
    ];
    const labelEls = LABELS.map(function (l) {
      const el = document.createElement('div'); el.className = 'lab'; el.textContent = l.t;
      document.body.appendChild(el); return el;
    });
    const proj = new THREE.Vector3();
    function updateLabels() {
      for (let i = 0; i < LABELS.length; i++) {
        proj.copy(LABELS[i].p).project(camera);
        const el = labelEls[i];
        if (proj.z > 1) { el.style.opacity = '0'; continue; }
        el.style.opacity = '0.95';
        el.style.left = ((proj.x * 0.5 + 0.5) * W) + 'px';
        el.style.top = ((-proj.y * 0.5 + 0.5) * H) + 'px';
      }
    }

    // ---------- loop ----------
    let started = false;
    function animate() {
      requestAnimationFrame(animate);
      const k = 0.1;
      ['theta', 'phi', 'radius', 'tx', 'ty', 'tz'].forEach(function (key) { cam[key] += (goal[key] - cam[key]) * k; });
      applyCam();
      renderer.render(scene, camera);
      updateLabels();
      if (!started) { started = true; const ld = document.getElementById('load'); ld.style.opacity = '0'; setTimeout(function () { ld.style.display = 'none'; }, 600); }
    }
    applyCam();
    animate();

    window.addEventListener('resize', function () {
      W = window.innerWidth; H = window.innerHeight;
      camera.aspect = W / H; camera.updateProjectionMatrix(); renderer.setSize(W, H);
    });
  })();
  </script>
</body>
</html>
